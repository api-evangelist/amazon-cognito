naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Cognito User Authentication"
  description: "Workflow capability for managing user authentication, identity federation, and access control using Amazon Cognito User Pools and Identity Pools. Used by application developers and platform administrators to implement secure sign-up, sign-in, and AWS resource access for web and mobile apps."
  tags:
    - Amazon
    - AWS
    - Authentication
    - Identity
    - User Management
    - OAuth
    - Federated Identity
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION
      COGNITO_USER_POOL_ID: COGNITO_USER_POOL_ID
      COGNITO_CLIENT_ID: COGNITO_CLIENT_ID
      COGNITO_IDENTITY_POOL_ID: COGNITO_IDENTITY_POOL_ID

capability:
  consumes:
    - import: cognito-user-pools
      location: ./shared/cognito-user-pools.yaml
    - import: cognito-identity-pools
      location: ./shared/cognito-identity-pools.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: user-auth-api
      description: "Unified REST API for Amazon Cognito user authentication and identity management."
      resources:
        - path: /v1/user-pools
          name: user-pools
          description: "Manage Cognito user pools."
          operations:
            - method: GET
              name: list-user-pools
              description: "List all user pools."
              call: "cognito-user-pools.list-user-pools"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: POST
              name: create-user-pool
              description: "Create a new user pool."
              call: "cognito-user-pools.create-user-pool"
              with:
                pool_name: "rest.pool_name"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/user-pools/{user_pool_id}/users
          name: users
          description: "Manage users within a user pool."
          operations:
            - method: GET
              name: list-users
              description: "List users in a user pool."
              call: "cognito-user-pools.list-users"
              with:
                user_pool_id: "rest.user_pool_id"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: POST
              name: create-user
              description: "Create a new user in the pool."
              call: "cognito-user-pools.admin-create-user"
              with:
                user_pool_id: "rest.user_pool_id"
                username: "rest.username"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/identity-pools
          name: identity-pools
          description: "Manage Cognito identity pools."
          operations:
            - method: GET
              name: list-identity-pools
              description: "List all identity pools."
              call: "cognito-identity-pools.list-identity-pools"
              with:
                max_results: "rest.max_results"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/auth/initiate
          name: auth-initiate
          description: "Initiate authentication flows."
          operations:
            - method: POST
              name: initiate-auth
              description: "Start the authentication flow."
              call: "cognito-user-pools.initiate-auth"
              with:
                auth_flow: "rest.auth_flow"
                client_id: "rest.client_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/credentials
          name: credentials
          description: "Get temporary AWS credentials."
          operations:
            - method: POST
              name: get-credentials
              description: "Get temporary AWS credentials for a federated identity."
              call: "cognito-identity-pools.get-credentials-for-identity"
              with:
                identity_id: "rest.identity_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: user-auth-mcp
      transport: http
      description: "MCP server for AI-assisted Amazon Cognito user authentication and identity management."
      tools:
        - name: list-user-pools
          description: "List all Amazon Cognito user pools in the account."
          hints:
            readOnly: true
          call: "cognito-user-pools.list-user-pools"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-user-pool
          description: "Get configuration details of a specific Cognito user pool."
          hints:
            readOnly: true
          call: "cognito-user-pools.describe-user-pool"
          with:
            user_pool_id: "tools.user_pool_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-user-pool
          description: "Create a new Amazon Cognito user pool."
          hints:
            readOnly: false
            destructive: false
          call: "cognito-user-pools.create-user-pool"
          with:
            pool_name: "tools.pool_name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-users
          description: "List users in a Cognito user pool."
          hints:
            readOnly: true
          call: "cognito-user-pools.list-users"
          with:
            user_pool_id: "tools.user_pool_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-user
          description: "Get details of a specific user in a Cognito user pool."
          hints:
            readOnly: true
          call: "cognito-user-pools.admin-get-user"
          with:
            user_pool_id: "tools.user_pool_id"
            username: "tools.username"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-user
          description: "Create a new user in a Cognito user pool."
          hints:
            readOnly: false
            destructive: false
          call: "cognito-user-pools.admin-create-user"
          with:
            user_pool_id: "tools.user_pool_id"
            username: "tools.username"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-user
          description: "Delete a user from a Cognito user pool."
          hints:
            readOnly: false
            destructive: true
          call: "cognito-user-pools.admin-delete-user"
          with:
            user_pool_id: "tools.user_pool_id"
            username: "tools.username"
          outputParameters:
            - type: object
              mapping: "$."

        - name: initiate-auth
          description: "Initiate an authentication flow in Cognito."
          hints:
            readOnly: false
            destructive: false
          call: "cognito-user-pools.initiate-auth"
          with:
            auth_flow: "tools.auth_flow"
            client_id: "tools.client_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-identity-pools
          description: "List all Cognito identity pools."
          hints:
            readOnly: true
          call: "cognito-identity-pools.list-identity-pools"
          with:
            max_results: "tools.max_results"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-identity-pool
          description: "Get details of a specific Cognito identity pool."
          hints:
            readOnly: true
          call: "cognito-identity-pools.describe-identity-pool"
          with:
            identity_pool_id: "tools.identity_pool_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-credentials
          description: "Get temporary AWS credentials for a federated Cognito identity."
          hints:
            readOnly: true
          call: "cognito-identity-pools.get-credentials-for-identity"
          with:
            identity_id: "tools.identity_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-identity-pool
          description: "Create a new Cognito identity pool for federated identity management."
          hints:
            readOnly: false
            destructive: false
          call: "cognito-identity-pools.create-identity-pool"
          with:
            pool_name: "tools.pool_name"
            allow_unauth: "tools.allow_unauth"
          outputParameters:
            - type: object
              mapping: "$."
