- aid: amazon-cognito:identity-pools-api
  name: Amazon Cognito Identity Pools API
  description: The Amazon Cognito Identity Pools (Federated Identities) API enables
    developers to create unique identities for users and federate them with identity
    providers. It provides temporary, limited-privilege AWS credentials to access
    AWS services with operations covering identity pool management, credential dispensing,
    and provider configuration. Authentication uses AWS Signature Version 4 (SigV4).
  humanURL: https://docs.aws.amazon.com/cognitoidentity/latest/APIReference/Welcome.html
  baseURL: https://cognito-identity.us-east-1.amazonaws.com
