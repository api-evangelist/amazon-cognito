- aid: amazon-cognito:user-pools-api
  name: Amazon Cognito User Pools API
  description: The Amazon Cognito User Pools API provides user directory management,
    sign-up, sign-in, and token-based authentication for web and mobile applications.
    It supports multi-factor authentication, account recovery, and customizable authentication
    flows with operations covering user pools, users, groups, app clients, and resource
    servers. Authentication uses AWS Signature Version 4 (SigV4).
