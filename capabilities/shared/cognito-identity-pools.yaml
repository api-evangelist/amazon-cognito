naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Cognito Identity Pools API"
  description: "Shared per-API capability definition for Amazon Cognito Identity Pools covering federated identity management and temporary AWS credential dispensing."
  tags:
    - Amazon
    - AWS
    - Authentication
    - Identity
    - Federated Identity
    - Authorization
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION
      COGNITO_IDENTITY_POOL_ID: COGNITO_IDENTITY_POOL_ID

capability:
  consumes:
    - type: http
      namespace: cognito-identity-pools
      baseUri: https://cognito-identity.{region}.amazonaws.com
      description: "Amazon Cognito Identity Pools API for federated identity and AWS credential management."
      authentication:
        type: bearer
        token: "{{AWS_ACCESS_KEY_ID}}"
      resources:
        - name: identity-pools
          path: /
          description: "Identity pool management operations."
          operations:
            - name: create-identity-pool
              method: POST
              description: "Creates a new identity pool."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  IdentityPoolName: "{{tools.pool_name}}"
                  AllowUnauthenticatedIdentities: "{{tools.allow_unauth}}"

            - name: list-identity-pools
              method: POST
              description: "Lists all of the Cognito identity pools registered for your account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  MaxResults: "{{tools.max_results}}"

            - name: describe-identity-pool
              method: POST
              description: "Gets details about a particular identity pool, including the pool name, ID description, creation date, and current number of users."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  IdentityPoolId: "{{tools.identity_pool_id}}"

            - name: get-credentials-for-identity
              method: POST
              description: "Returns credentials for the provided identity ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  IdentityId: "{{tools.identity_id}}"

            - name: get-id
              method: POST
              description: "Generates (or retrieves) a Cognito ID. Supplying multiple logins will create an implicit linked account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  AccountId: "{{tools.account_id}}"
                  IdentityPoolId: "{{tools.identity_pool_id}}"

  exposes:
    - type: rest
      port: 8101
      namespace: cognito-identity-pools-rest
      resources:
        - path: /v1/identity-pools
          name: identity-pools
          description: "Identity pool management."
          operations:
            - method: GET
              name: list-identity-pools
              description: "List all Cognito identity pools."
              call: "cognito-identity-pools.list-identity-pools"
              with:
                max_results: "rest.max_results"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: cognito-identity-pools-mcp
      transport: http
      tools:
        - name: list-identity-pools
          description: "List all Amazon Cognito identity pools."
          hints:
            readOnly: true
          call: "cognito-identity-pools.list-identity-pools"
          with:
            max_results: "tools.max_results"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-credentials
          description: "Get temporary AWS credentials for a Cognito identity."
          hints:
            readOnly: true
          call: "cognito-identity-pools.get-credentials-for-identity"
          with:
            identity_id: "tools.identity_id"
          outputParameters:
            - type: object
              mapping: "$."
