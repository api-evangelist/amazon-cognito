  - name: Cognito Identity Pools API
    description: >-
      Amazon Cognito Identity Pools (Federated Identities) API enables
      developers to create unique identities for users and federate them with
      identity providers. It provides temporary, limited-privilege AWS
      credentials to access AWS services with 23 operations covering identity
      pool management, credential dispensing, and provider configuration.
