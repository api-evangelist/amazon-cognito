components:
  parameters:
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
  schemas:
    PaginationKey:
      type: string
      pattern: '[\S]+'
      minLength: 1
    ResourceNotFoundException: {}
    RiskDecisionType:
      type: string
      enum:
      - NoRisk
      - AccountTakeover
      - Block
    DateType:
      type: string
      format: date-time
    EventContextDataType:
      type: object
      properties:
        IpAddress:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The source IP address of your user's device.
        DeviceName:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The user's device name.
        Timezone:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The user's time zone.
        City:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The user's city.
        Country:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The user's country.
      description: Specifies the user context data captured at the time of an event request.
    ChallengeResponseListType:
      type: array
      items:
        $ref: '#/components/schemas/ChallengeResponseType'
    EventType:
      type: string
      enum:
      - SignIn
      - SignUp
      - ForgotPassword
      - PasswordChange
      - ResendCode
    AdminListUserAuthEventsResponse:
      type: object
      properties:
        AuthEvents:
          allOf:
          - $ref: '#/components/schemas/AuthEventsType'
          - description: The response object. It includes the <code>EventID</code>, <code>EventType</code>, <code>CreationDate</code>, <code>EventRisk</code>, and <code>EventResponse</code>.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/PaginationKey'
          - description: A pagination token.
    AdminListUserAuthEventsRequest:
      type: object
      required:
      - UserPoolId
      - Username
      title: AdminListUserAuthEventsRequest
      properties:
        UserPoolId:
          allOf:
          - $ref: '#/components/schemas/UserPoolIdType'
          - description: The user pool ID.
        Username:
          allOf:
          - $ref: '#/components/schemas/UsernameType'
          - description: The user pool username or an alias.
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/QueryLimitType'
          - description: The maximum number of authentication events to return. Returns 60 events if you set <code>MaxResults</code> to 0, or if you don't include a <code>MaxResults</code> parameter.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/PaginationKey'
          - description: A pagination token.
    InvalidParameterException: {}
    EventRiskType:
      type: object
      properties:
        RiskDecision:
          allOf:
          - $ref: '#/components/schemas/RiskDecisionType'
          - description: The risk decision.
        RiskLevel:
          allOf:
          - $ref: '#/components/schemas/RiskLevelType'
          - description: The risk level.
        CompromisedCredentialsDetected:
          allOf:
          - $ref: '#/components/schemas/WrappedBooleanType'
          - description: Indicates whether compromised credentials were detected during an authentication event.
      description: The event risk type.
    EventFeedbackType:
      type: object
      required:
      - FeedbackValue
      - Provider
      properties:
        FeedbackValue:
          allOf:
          - $ref: '#/components/schemas/FeedbackValueType'
          - description: The authentication event feedback value. When you provide a <code>FeedbackValue</code> value of <code>valid</code>, you tell Amazon Cognito that you trust a user session where Amazon Cognito has evaluated some level of risk. When you provide a <code>FeedbackValue</code> value of <code>invalid</code>, you tell Amazon Cognito that you don't trust a user session, or you don't believe that Amazon Cognito evaluated a high-enough risk level.
        Provider:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The provider.
        FeedbackDate:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The event feedback date.
      description: Specifies the event feedback type.
    EventResponseType:
      type: string
      enum:
      - Pass
      - Fail
      - InProgress
    AuthEventsType:
      type: array
      items:
        $ref: '#/components/schemas/AuthEventType'
    RiskLevelType:
      type: string
      enum:
      - Low
      - Medium
      - High
    QueryLimitType:
      type: integer
      minimum: 0
      maximum: 60
    WrappedBooleanType:
      type: boolean
    UserNotFoundException: {}
    UserPoolAddOnNotEnabledException: {}
    StringType:
      type: string
      minLength: 0
      maxLength: 131072
    ChallengeResponseType:
      type: object
      properties:
        ChallengeName:
          allOf:
          - $ref: '#/components/schemas/ChallengeName'
          - description: The challenge name.
        ChallengeResponse:
          allOf:
          - $ref: '#/components/schemas/ChallengeResponse'
          - description: The challenge response.
      description: The challenge response type.
    UserPoolIdType:
      type: string
      pattern: '[\w-]+_[0-9a-zA-Z]+'
      minLength: 1
      maxLength: 55
    ChallengeName:
      type: string
      enum:
      - Password
      - Mfa
    NotAuthorizedException: {}
    FeedbackValueType:
      type: string
      enum:
      - Valid
      - Invalid
    InternalErrorException: {}
    UsernameType:
      type: string
      pattern: '[\p{L}\p{M}\p{S}\p{N}\p{P}]+'
      minLength: 1
      maxLength: 128
      format: password
    ChallengeResponse:
      type: string
      enum:
      - Success
      - Failure
    TooManyRequestsException: {}
    AuthEventType:
      type: object
      properties:
        EventId:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The event ID.
        EventType:
          allOf:
          - $ref: '#/components/schemas/EventType'
          - description: The event type.
        CreationDate:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The date and time, in <a href="https://www.iso.org/iso-8601-date-and-time-format.html">ISO 8601</a> format, when the item was created.
        EventResponse:
          allOf:
          - $ref: '#/components/schemas/EventResponseType'
          - description: The event response.
        EventRisk:
          allOf:
          - $ref: '#/components/schemas/EventRiskType'
          - description: The event risk.
        ChallengeResponses:
          allOf:
          - $ref: '#/components/schemas/ChallengeResponseListType'
          - description: The challenge responses.
        EventContextData:
          allOf:
          - $ref: '#/components/schemas/EventContextDataType'
          - description: The user context data captured at the time of an event request. This value provides additional information about the client from which event the request is received.
        EventFeedback:
          allOf:
          - $ref: '#/components/schemas/EventFeedbackType'
          - description: 'A flag specifying the user feedback captured at the time of an event request is good or bad. '
      description: The authentication event type.
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
