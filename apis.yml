aid: amazon-cognito
name: Amazon Cognito
description: Amazon Cognito is a fully managed AWS user identity and authentication
  service that adds sign-up, sign-in, and access control to web and mobile applications,
  scaling to millions of users. It provides User Pools for authentication (user directories,
  MFA, customizable auth flows) and Identity Pools for authorization (federated identities
  that dispense temporary AWS credentials), with support for OAuth 2.0, OpenID Connect,
  and SAML 2.0. The Cognito APIs are AWS regional service endpoints accessed over
  HTTPS using AWS Signature Version 4 (SigV4), typically via the AWS SDKs.
