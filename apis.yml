name: Amazon Cognito API
description: >-
  Amazon Cognito is a fully managed user identity and authentication service
  that enables developers to add sign-up, sign-in, and access control to web
  and mobile applications. It supports OAuth 2.0, SAML 2.0, and OpenID Connect
  standards, providing secure user directories that scale to millions of users.
  Cognito offers user pools for authentication and identity pools for
  authorization, allowing integration with social identity providers and
  enterprise identity systems.
