apis:
  - name: Cognito User Pools API
    description: >-
      Amazon Cognito User Pools API provides user directory management,
      sign-up, sign-in, and token-based authentication for web and mobile
      applications. It supports multi-factor authentication, account recovery,
      and customizable authentication flows.
    baseURL: https://cognito-idp.amazonaws.com
